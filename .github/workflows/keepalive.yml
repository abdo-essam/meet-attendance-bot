name: 🔄 Cookie Keepalive

on:
  schedule:
    - cron: '0 3 * * *'

  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🌐 Install Chrome & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg xvfb dbus dbus-x11 || true

          sudo mkdir -p /run/dbus || true
          sudo dbus-daemon --system --fork || true

          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

          google-chrome-stable --version
          
      - name: 🧹 Clean old cache
        run: |
          rm -rf bot/node_modules bot/package-lock.json
          rm -rf ~/.cache/puppeteer

      - name: 📦 Install dependencies
        run: cd bot && npm install

      - name: 🍪 Restore cookies
        env:
          GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
        run: |
          cd bot
          if [ -f ../cookies/session.enc ]; then
            echo "Using encrypted cookies from repo"
          elif [ -n "$GOOGLE_COOKIES" ]; then
            echo "$GOOGLE_COOKIES" | base64 -d > cookies.json
          fi

      - name: 🔄 Refresh cookies
        env:
          COOKIE_PASSWORD: ${{ secrets.COOKIE_PASSWORD }}
          GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
        run: |
          export DISPLAY=:99
          # Only start Xvfb if not already running
          if ! pgrep -x Xvfb > /dev/null; then
            Xvfb :99 -screen 0 1280x720x24 -ac +extension GLX +render -noreset &
            sleep 3
          fi
          
          eval $(dbus-launch --sh-syntax) || true
          export DBUS_SESSION_BUS_ADDRESS
          
          cd bot && node refresh-cookies.js

      - name: 💾 Save refreshed cookies
        if: always()
        run: |
          git config user.name "Cookie Bot"
          git config user.email "bot@attendance.local"
          git add -f cookies/session.enc || true
          git diff --staged --quiet || git commit -m "🍪 Cookie refresh $(date +'%Y-%m-%d')"
          git push || true

      - name: 🚨 Notify on failure
        if: failure()
        run: |
          echo "❌ Cookie refresh FAILED!"
          echo "Cookies may have expired."
          echo "Run save-cookies.js on your PC and update GitHub Secret."
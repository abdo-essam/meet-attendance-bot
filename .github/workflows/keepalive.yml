name: 🔄 Cookie Keepalive

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🌐 Install Chrome 127
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb dbus dbus-x11 || true
          
          wget -q https://storage.googleapis.com/chrome-for-testing-public/127.0.6533.88/linux64/chrome-linux64.zip
          unzip -q chrome-linux64.zip
          sudo mv chrome-linux64 /opt/chrome-127
          sudo chmod +x /opt/chrome-127/chrome
          
          sudo apt-get install -y \
            fonts-liberation libasound2t64 libatk-bridge2.0-0 \
            libatk1.0-0 libcups2 libdbus-1-3 libdrm2 libgbm1 \
            libgtk-3-0 libnspr4 libnss3 libx11-xcb1 libxcomposite1 \
            libxdamage1 libxrandr2 xdg-utils libxshmfence1 \
            libxkbcommon0 libpango-1.0-0 libcairo2 || true

      - name: 📦 Install dependencies
        run: |
          rm -rf bot/node_modules bot/package-lock.json
          cd bot && npm install

      - name: 🍪 Restore cookies
        env:
          GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
        run: |
          cd bot
          if [ -f ../cookies/session.enc ]; then
            echo "Using encrypted cookies from repo"
          elif [ -n "$GOOGLE_COOKIES" ]; then
            echo "$GOOGLE_COOKIES" | base64 -d > cookies.json
          fi

      - name: 🔄 Refresh cookies
        env:
          COOKIE_PASSWORD: ${{ secrets.COOKIE_PASSWORD }}
          GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
          CHROME_PATH: /opt/chrome-127/chrome
        run: |
          eval $(dbus-launch --sh-syntax)
          cd bot && xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24 -ac" node refresh-cookies.js

      - name: 💾 Save refreshed cookies
        if: always()
        run: |
          git config user.name "Cookie Bot"
          git config user.email "bot@attendance.local"
          git add -f cookies/session.enc || true
          git diff --staged --quiet || git commit -m "🍪 Cookie refresh $(date +'%Y-%m-%d')"
          git push || true

      - name: 🚨 Notify on failure
        if: failure()
        run: echo "❌ Cookie refresh FAILED!"
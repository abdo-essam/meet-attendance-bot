name: 📊 Attend Meeting

on:
  schedule:
    - cron: '0 18 * * 0,2,4'
  workflow_dispatch:
    inputs:
      meet_link:
        description: 'Google Meet link'
        required: true
        default: 'https://meet.google.com/rip-oyzq-eze'
      meeting_name:
        description: 'Meeting name'
        required: true
        default: 'My Class'
      duration_minutes:
        description: 'Duration in minutes (max 350)'
        required: true
        default: '1'

jobs:
  attend:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🌐 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb dbus dbus-x11 \
            fonts-liberation libasound2t64 libatk-bridge2.0-0 \
            libatk1.0-0 libcups2 libdbus-1-3 libdrm2 libgbm1 \
            libgtk-3-0 libnspr4 libnss3 libx11-xcb1 libxcomposite1 \
            libxdamage1 libxrandr2 xdg-utils libxshmfence1 \
            libxkbcommon0 libpango-1.0-0 libcairo2 || true

      - name: 📦 Install dependencies
        run: cd bot && npm install

      - name: 🔍 Verify Chrome
        run: |
          cd bot
          CHROME_PATH=$(node -e "console.log(require('puppeteer').executablePath())")
          echo "Chrome path: $CHROME_PATH"
          ls -la "$CHROME_PATH" || echo "Chrome binary not found!"
          "$CHROME_PATH" --version || echo "Chrome --version failed"
          # Quick launch test
          xvfb-run --auto-servernum node -e "
            const puppeteer = require('puppeteer');
            (async () => {
              const browser = await puppeteer.launch({
                headless: true,
                args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
              });
              console.log('✅ Chrome launched OK, version:', await browser.version());
              await browser.close();
            })().catch(e => { console.error('❌', e.message); process.exit(1); });
          "

      - name: 🍪 Restore cookies
        env:
          GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
          COOKIE_PASSWORD: ${{ secrets.COOKIE_PASSWORD }}
        run: |
          cd bot
          if [ -f ../cookies/session.enc ]; then
            echo "Using encrypted cookies from repo"
          elif [ -n "$GOOGLE_COOKIES" ]; then
            echo "$GOOGLE_COOKIES" | base64 -d > cookies.json
            echo "Using cookies from GitHub Secret"
          fi

      - name: 🤖 Run bot
        env:
          MEET_LINK: ${{ github.event.inputs.meet_link || secrets.MEET_LINK }}
          MEETING_NAME: ${{ github.event.inputs.meeting_name || 'Scheduled Class' }}
          DURATION_MINUTES: ${{ github.event.inputs.duration_minutes || '120' }}
          COOKIE_PASSWORD: ${{ secrets.COOKIE_PASSWORD }}
          GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
        run: |
          eval $(dbus-launch --sh-syntax)
          cd bot && xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24 -ac" node bot.js
        timeout-minutes: 360

      - name: 💾 Save refreshed cookies & reports
        if: always()
        run: |
          git config user.name "Attendance Bot"
          git config user.email "bot@attendance.local"
          git add -f cookies/session.enc || true
          git add -f bot/reports/ || true
          git diff --staged --quiet || git commit -m "📊 Report + 🍪 Cookie refresh $(date +'%Y-%m-%d %H:%M')"
          git push || true

      - name: 📊 Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: attendance-${{ github.run_number }}
          path: bot/reports/
          retention-days: 90
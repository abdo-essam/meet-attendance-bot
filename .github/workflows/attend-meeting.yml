name: 📊 Attend Meeting

on:
  schedule:
    - cron: '0 18 * * 0,2,4'

  workflow_dispatch:
    inputs:
      meet_link:
        description: 'Google Meet link'
        required: true
        default: 'https://meet.google.com/rip-oyzq-eze'
      meeting_name:
        description: 'Meeting name'
        required: true
        default: 'My Class'
      duration_minutes:
        description: 'Duration in minutes (max 350)'
        required: true
        default: '1'

jobs:
  attend:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🌐 Install Chrome & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
          # Verify installation
          google-chrome-stable --version

      - name: 📦 Install dependencies
        run: cd bot && npm install

      - name: 🍪 Restore cookies
        env:
          GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
          COOKIE_PASSWORD: ${{ secrets.COOKIE_PASSWORD }}
        run: |
          cd bot
          if [ -f ../cookies/session.enc ]; then
            echo "Using encrypted cookies from repo"
          elif [ -n "$GOOGLE_COOKIES" ]; then
            echo "$GOOGLE_COOKIES" | base64 -d > cookies.json
            echo "Using cookies from GitHub Secret"
          fi

      - name: 🤖 Run bot
        env:
          MEET_LINK: ${{ github.event.inputs.meet_link || secrets.MEET_LINK }}
          MEETING_NAME: ${{ github.event.inputs.meeting_name || 'Scheduled Class' }}
          DURATION_MINUTES: ${{ github.event.inputs.duration_minutes || '120' }}
          COOKIE_PASSWORD: ${{ secrets.COOKIE_PASSWORD }}
          GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
        run: cd bot && node bot.js
        timeout-minutes: 360

      - name: 💾 Save refreshed cookies & reports
        if: always()
        run: |
          git config user.name "Attendance Bot"
          git config user.email "bot@attendance.local"
          git add -f cookies/session.enc || true
          git add -f bot/reports/ || true
          git diff --staged --quiet || git commit -m "📊 Report + 🍪 Cookie refresh $(date +'%Y-%m-%d %H:%M')"
          git push || true

      - name: 📊 Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: attendance-${{ github.run_number }}
          path: bot/reports/
          retention-days: 90
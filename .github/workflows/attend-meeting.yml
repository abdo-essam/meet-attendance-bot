name: 📊 Attend Meeting

on:
  schedule:
    - cron: '0 18 * * 0,2,4'

  workflow_dispatch:
    inputs:
      meet_link:
        description: 'Google Meet link'
        required: true
        default: 'https://meet.google.com/rip-oyzq-eze'
      meeting_name:
        description: 'Meeting name'
        required: true
        default: 'My Class'
      duration_minutes:
        description: 'Duration in minutes (max 350)'
        required: true
        default: '1'

jobs:
  attend:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🌐 Install Chrome & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg xvfb dbus dbus-x11 || true

          sudo mkdir -p /run/dbus || true
          sudo dbus-daemon --system --fork || true

          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

          google-chrome-stable --version

      - name: 🔍 Debug Chrome Launch
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 -ac +extension GLX +render -noreset &
          sleep 3

          eval $(dbus-launch --sh-syntax)
          export DBUS_SESSION_BUS_ADDRESS

          echo "=== Testing Chrome directly ==="
          google-chrome-stable --headless --no-sandbox --disable-gpu --dump-dom https://www.google.com 2>&1 | head -50 || true

          echo ""
          echo "=== Testing Chrome with --headless=new ==="
          google-chrome-stable --headless=new --no-sandbox --disable-gpu --dump-dom https://www.google.com 2>&1 | head -50 || true

          echo ""
          echo "=== Testing Chrome with --headless=old ==="
          google-chrome-stable --headless=old --no-sandbox --disable-gpu --dump-dom https://www.google.com 2>&1 | head -50 || true

          echo ""
          echo "=== Chrome binary info ==="
          which google-chrome-stable
          ls -la /usr/bin/google-chrome*
          file /usr/bin/google-chrome-stable

          echo ""
          echo "=== Check shared libraries ==="
          ldd /opt/google/chrome/chrome 2>&1 | grep "not found" || echo "All libraries found!"

          echo ""
          echo "=== Puppeteer Chrome path ==="
          ls -la node_modules/puppeteer-core/.local-chromium/ 2>/dev/null || true
          ls -la node_modules/puppeteer/.local-chromium/ 2>/dev/null || true
          find /home/runner -name "chrome" -type f 2>/dev/null | head -5 || true

      - name: 🧹 Clean old cache
        run: |
          rm -rf bot/node_modules bot/package-lock.json
          rm -rf ~/.cache/puppeteer

      - name: 📦 Install dependencies
        run: cd bot && npm install

      - name: 🔍 Debug Puppeteer Chrome
        run: |
          cd bot
          echo "=== Puppeteer cache ==="
          ls -la ~/.cache/puppeteer/ 2>/dev/null || echo "No puppeteer cache"
          find ~/.cache/puppeteer -name "chrome" -type f 2>/dev/null || echo "No chrome in cache"
          
          echo ""
          echo "=== Node test ==="
          node -e "
            const puppeteer = require('puppeteer');
            console.log('Puppeteer executable:', puppeteer.executablePath());
            const fs = require('fs');
            console.log('Exists:', fs.existsSync(puppeteer.executablePath()));
          " || true

      - name: 🍪 Restore cookies
        env:
          GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
          COOKIE_PASSWORD: ${{ secrets.COOKIE_PASSWORD }}
        run: |
          cd bot
          if [ -f ../cookies/session.enc ]; then
            echo "Using encrypted cookies from repo"
          elif [ -n "$GOOGLE_COOKIES" ]; then
            echo "$GOOGLE_COOKIES" | base64 -d > cookies.json
            echo "Using cookies from GitHub Secret"
          fi

      - name: 🤖 Run bot
        env:
          MEET_LINK: ${{ github.event.inputs.meet_link || secrets.MEET_LINK }}
          MEETING_NAME: ${{ github.event.inputs.meeting_name || 'Scheduled Class' }}
          DURATION_MINUTES: ${{ github.event.inputs.duration_minutes || '120' }}
          COOKIE_PASSWORD: ${{ secrets.COOKIE_PASSWORD }}
          GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
        run: |
          export DISPLAY=:99
          # Only start Xvfb if not already running
          if ! pgrep -x Xvfb > /dev/null; then
            Xvfb :99 -screen 0 1280x720x24 -ac +extension GLX +render -noreset &
            sleep 3
          fi

          eval $(dbus-launch --sh-syntax) || true
          export DBUS_SESSION_BUS_ADDRESS

          cd bot && node bot.js
        timeout-minutes: 360

      - name: 💾 Save refreshed cookies & reports
        if: always()
        run: |
          git config user.name "Attendance Bot"
          git config user.email "bot@attendance.local"
          git add -f cookies/session.enc || true
          git add -f bot/reports/ || true
          git diff --staged --quiet || git commit -m "📊 Report + 🍪 Cookie refresh $(date +'%Y-%m-%d %H:%M')"
          git push || true

      - name: 📊 Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: attendance-${{ github.run_number }}
          path: bot/reports/
          retention-days: 90